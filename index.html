<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Тест: история, параграфы 1-4</title>
  <link rel="preload" href="images/ancient-people.jpg" as="image">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <main class="app">
    <header class="intro">
      <div class="intro-text">
        <p class="eyebrow"><span class="mini-icon" data-icon="map" aria-hidden="true"></span>История, 5 класс</p>
        <h1>Археологический тест: параграфы 1-4</h1>
        <p class="lead">Отвечай на вопросы, собирай подсказки и повторяй тему о древнейших людях, охоте, верованиях и первых земледельцах.</p>
        <div class="hero-actions" aria-label="Быстрые действия">
          <a class="button primary" href="#quiz"><span class="button-icon" data-icon="flag" aria-hidden="true"></span>Начать тест</a>
          <button class="button soft" type="button" id="showMaterialsButton"><span class="button-icon" data-icon="brush" aria-hidden="true"></span>Конспект</button>
        </div>
        <dl class="hero-facts" aria-label="Кратко о тесте">
          <div>
            <dt>25</dt>
            <dd>вопросов</dd>
          </div>
          <div>
            <dt>6</dt>
            <dd>с двумя ответами</dd>
          </div>
          <div>
            <dt>4</dt>
            <dd>сопоставления</dd>
          </div>
        </dl>
      </div>
      <figure class="hero-visual">
        <img src="images/ancient-people.jpg" alt="Древние люди у костра рядом с пещерой">
        <figcaption><span class="mini-icon" data-icon="camp" aria-hidden="true"></span>Путешествие по первобытной истории</figcaption>
      </figure>
    </header>

    <section class="theme-board" aria-label="Темы теста" id="themeBoard"></section>

    <section class="toolbar" aria-label="Панель теста">
      <div class="progress-wrap">
        <div class="progress-label">
          <span>Отвечено: <span id="answeredCount">0</span> из <span id="totalCount">0</span></span>
          <span id="progressText">0%</span>
        </div>
        <div class="progress" aria-hidden="true">
          <div class="progress-bar" id="progressBar"></div>
        </div>
      </div>
      <button class="button" type="button" id="shuffleButton"><span class="button-icon" data-icon="shuffle" aria-hidden="true"></span>Перемешать задания</button>
      <button class="button" type="button" id="resetButton"><span class="button-icon" data-icon="refresh" aria-hidden="true"></span>Пройти ещё раз</button>
    </section>

    <form class="quiz" id="quiz"></form>

    <section class="check-panel" aria-label="Проверка результата" id="resultPanel">
      <button class="button primary" type="button" id="checkButton"><span class="button-icon" data-icon="check" aria-hidden="true"></span>Проверить ответы</button>
      <div class="result" id="result" hidden></div>
    </section>

    <details class="materials" id="materials">
      <summary><span class="mini-icon" data-icon="book" aria-hidden="true"></span>Фотографии конспекта</summary>
      <div class="note-grid">
        <a href="assets/paragraph-1-tools-fire.jpg" target="_blank" aria-label="Открыть конспект по параграфу 1">
          <img src="assets/paragraph-1-tools-fire.jpg" alt="Конспект по параграфу 1">
        </a>
        <a href="assets/paragraph-2-hunters.jpg" target="_blank" aria-label="Открыть конспект по охотникам и собирателям">
          <img src="assets/paragraph-2-hunters.jpg" alt="Конспект по охотникам и собирателям">
        </a>
        <a href="assets/paragraph-2-russia.jpg" target="_blank" aria-label="Открыть конспект о первобытности на территории России">
          <img src="assets/paragraph-2-russia.jpg" alt="Конспект о первобытности на территории России">
        </a>
        <a href="assets/paragraph-2-sites.jpg" target="_blank" aria-label="Открыть конспект о древних стоянках">
          <img src="assets/paragraph-2-sites.jpg" alt="Конспект о древних стоянках">
        </a>
        <a href="assets/paragraph-3-beliefs-art.jpg" target="_blank" aria-label="Открыть конспект по верованиям и искусству">
          <img src="assets/paragraph-3-beliefs-art.jpg" alt="Конспект по верованиям и искусству">
        </a>
        <a href="assets/paragraph-3-clan-races.jpg" target="_blank" aria-label="Открыть конспект о роде, племени и расах">
          <img src="assets/paragraph-3-clan-races.jpg" alt="Конспект о роде, племени и расах">
        </a>
        <a href="assets/paragraph-4-farming.jpg" target="_blank" aria-label="Открыть конспект по переходу к производящему хозяйству">
          <img src="assets/paragraph-4-farming.jpg" alt="Конспект по переходу к производящему хозяйству">
        </a>
      </div>
    </details>
  </main>

  <script src="app.js" defer></script>
</body>
</html>
